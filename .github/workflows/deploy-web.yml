name: Deploy Flutter Web to Vercel Bypass

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href /

      - name: Setup SPA Routing (Vercel Fallback)
        run: cp build/web/index.html build/web/404.html

      - name: Commit build to public folder
        run: |
          mkdir -p public
          cp -r build/web/* public/
          cp vercel.json public/vercel.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/
          git commit -m "[skip ci] chore: update public build for vercel" || echo "No changes to commit"
          git push
